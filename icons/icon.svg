<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#2c2b25"/>
  <!-- Gem crown top-left facet -->
  <polygon points="14,38 30,38 50,18" fill="#a7a6a2"/>
  <!-- Gem crown top-right facet -->
  <polygon points="86,38 70,38 50,18" fill="#bba54c"/>
  <!-- Gem crown top-center facet -->
  <polygon points="30,38 50,18 70,38" fill="#dcd6b9"/>
  <!-- Gem pavilion left -->
  <polygon points="14,38 30,38 50,82" fill="#1F4F3C"/>
  <!-- Gem pavilion right -->
  <polygon points="86,38 70,38 50,82" fill="#bba54c" opacity="0.85"/>
  <!-- Gem pavilion center -->
  <polygon points="30,38 70,38 50,82" fill="#1F4F3C" opacity="0.7"/>
  <!-- Girdle line -->
  <line x1="14" y1="38" x2="86" y2="38" stroke="#2c2b25" stroke-width="1.5"/>
  <!-- Crown separation lines -->
  <line x1="50" y1="18" x2="30" y2="38" stroke="#2c2b25" stroke-width="0.8"/>
  <line x1="50" y1="18" x2="70" y2="38" stroke="#2c2b25" stroke-width="0.8"/>
  <!-- Pavilion separation lines -->
  <line x1="30" y1="38" x2="50" y2="82" stroke="#2c2b25" stroke-width="0.8"/>
  <line x1="70" y1="38" x2="50" y2="82" stroke="#2c2b25" stroke-width="0.8"/>
</svg>
